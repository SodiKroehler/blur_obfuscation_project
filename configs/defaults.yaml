# configs/defaults.yaml
# Inherited by every experiment. Override only what changes in configs/EX_XXX.yaml

# ── identity (always overridden by experiment config) ────────────────────────
exp_id:       null
epic:         null
description:  null
date:         null
owner:        null

# ── training ─────────────────────────────────────────────────────────────────
epochs:       20
lr:           0.001
batch_size:   64
seed:         42
weight_decay: 0.0001

# ── model ────────────────────────────────────────────────────────────────────
model:        BaseMaskNet
mask_type:    soft             # soft | hard | gumbel

# ── blur ─────────────────────────────────────────────────────────────────────
blur_type:    box
blur_kernel:  9               # must be odd

# ── data ─────────────────────────────────────────────────────────────────────
digit_source: MNIST            # MNIST | EMNIST
bg_source:    gradient         # gradient | imagenet
val_split:    0.1
img_size:     28               # pixel width/height of composite image

# ── loss ─────────────────────────────────────────────────────────────────────
lambda_pre:   0.5              # weight on pre-blur accuracy penalty
lambda_post:  0.5              # weight on post-blur accuracy reward

# ── logging ──────────────────────────────────────────────────────────────────
log_to:       both             # wandb | file | both

# ── paths (relative to experiment folder) ────────────────────────────────────
weights_dir:  Model/
log_dir:      logs/
raw_dir:      Raw/
results_dir:  Results/